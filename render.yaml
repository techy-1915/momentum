services:
  - type: web
    name: momentum-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    disk:
      name: momentum-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/momentum.db
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
